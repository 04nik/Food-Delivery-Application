{% extends 'customer/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center pt-5">
        <div class="col-md-5 col-sm-12">
            <div class="card border-0 shadow p-5" style="border-radius: 16px; background-color: #ffffff;">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="fas fa-lock fa-lg"></i>
                    </div>
                    <h2 class="font-weight-bold text-dark mb-1">Restaurant Login</h2>
                    <p class="text-muted">Sign in to access your dashboard</p>
                </div>

                <form class="login" method="POST" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    
                    {{ form|crispy }}

                    {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                    {% endif %}

                    <button class="btn btn-primary btn-block font-weight-bold py-3 mt-4 shadow-sm" type="submit" style="border-radius: 8px;">
                        Sign In
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a class="small text-muted font-weight-bold" href="{% url 'index' %}">
                        <i class="fas fa-home mr-1"></i> Return to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
